<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcraft Studio - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/admin-style.css">
</head>
<body class="bg-slate-950 text-slate-100">
    <!-- Login Page -->
    <div id="loginPage" class="min-h-screen bg-gradient-to-b from-slate-950 via-slate-900 to-slate-950 flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-lg p-8 max-w-md w-full">
            <div class="text-center mb-8">
                <i class="fas fa-lock text-4xl text-cyan-400 mb-4"></i>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">Admin Login</h1>
            </div>
            
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Email</label>
                    <input type="email" id="loginEmail" required class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg focus:border-cyan-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Password</label>
                    <input type="password" id="loginPassword" required class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg focus:border-cyan-500 focus:outline-none">
                </div>
                <div id="loginError" class="hidden text-red-400 text-sm p-3 bg-red-900/20 rounded"></div>
                <button type="submit" class="w-full px-4 py-3 bg-gradient-to-r from-cyan-500 to-cyan-400 text-slate-950 font-bold rounded-lg hover:shadow-lg hover:shadow-cyan-500/50 transition">
                    <i class="fas fa-sign-in-alt mr-2"></i>Login
                </button>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboardPage" class="hidden">
        <!-- Navigation -->
        <nav class="bg-slate-900 border-b border-slate-800 p-4">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <i class="fas fa-chart-line text-cyan-400 text-2xl"></i>
                    <h1 class="text-2xl font-bold">Admin Dashboard</h1>
                </div>
                <button id="logoutBtn" class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded transition">
                    <i class="fas fa-sign-out-alt mr-2"></i>Logout
                </button>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto p-4">
            <!-- Tabs -->
            <div class="flex gap-2 mb-6 overflow-x-auto pb-2 border-b border-slate-800">
                <button class="tab-btn px-6 py-2 bg-cyan-500/20 text-cyan-400 rounded-lg hover:bg-cyan-500/40 transition active" data-tab="overview">
                    <i class="fas fa-chart-pie mr-2"></i>Overview
                </button>
                <button class="tab-btn px-6 py-2 bg-purple-500/20 text-purple-400 rounded-lg hover:bg-purple-500/40 transition" data-tab="projects">
                    <i class="fas fa-folder mr-2"></i>Projects
                </button>
                <button class="tab-btn px-6 py-2 bg-purple-500/20 text-purple-400 rounded-lg hover:bg-purple-500/40 transition" data-tab="services">
                    <i class="fas fa-cog mr-2"></i>Services
                </button>
                <button class="tab-btn px-6 py-2 bg-purple-500/20 text-purple-400 rounded-lg hover:bg-purple-500/40 transition" data-tab="bookings">
                    <i class="fas fa-calendar mr-2"></i>Bookings
                </button>
                <button class="tab-btn px-6 py-2 bg-purple-500/20 text-purple-400 rounded-lg hover:bg-purple-500/40 transition" data-tab="inquiries">
                    <i class="fas fa-envelope mr-2"></i>Inquiries
                </button>
                <button class="tab-btn px-6 py-2 bg-purple-500/20 text-purple-400 rounded-lg hover:bg-purple-500/40 transition" data-tab="reviews">
                    <i class="fas fa-star mr-2"></i>Reviews
                </button>
                <button class="tab-btn px-6 py-2 bg-purple-500/20 text-purple-400 rounded-lg hover:bg-purple-500/40 transition" data-tab="settings">
                    <i class="fas fa-sliders-h mr-2"></i>Settings
                </button>
            </div>

            <!-- Overview Tab -->
            <div id="overview" class="tab-content">
                <div class="grid md:grid-cols-4 gap-4 mb-8">
                    <div class="bg-slate-900 border border-slate-800 rounded-lg p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-slate-400 text-sm">Total Projects</p>
                                <p id="totalProjects" class="text-3xl font-bold text-cyan-400">0</p>
                            </div>
                            <i class="fas fa-folder text-2xl text-cyan-400/50"></i>
                        </div>
                    </div>
                    <div class="bg-slate-900 border border-slate-800 rounded-lg p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-slate-400 text-sm">Bookings</p>
                                <p id="totalBookings" class="text-3xl font-bold text-purple-400">0</p>
                            </div>
                            <i class="fas fa-calendar text-2xl text-purple-400/50"></i>
                        </div>
                    </div>
                    <div class="bg-slate-900 border border-slate-800 rounded-lg p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-slate-400 text-sm">Inquiries</p>
                                <p id="totalInquiries" class="text-3xl font-bold text-yellow-400">0</p>
                            </div>
                            <i class="fas fa-envelope text-2xl text-yellow-400/50"></i>
                        </div>
                    </div>
                    <div class="bg-slate-900 border border-slate-800 rounded-lg p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-slate-400 text-sm">Reviews</p>
                                <p id="totalReviews" class="text-3xl font-bold text-green-400">0</p>
                            </div>
                            <i class="fas fa-star text-2xl text-green-400/50"></i>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-900 border border-slate-800 rounded-lg p-6">
                    <h3 class="text-xl font-bold mb-4">Recent Activity</h3>
                    <div id="recentActivity" class="space-y-3">
                        <p class="text-slate-400 text-sm">No recent activity yet</p>
                    </div>
                </div>
            </div>

            <!-- Projects Tab -->
            <div id="projects" class="tab-content hidden">
                <div class="mb-6 flex justify-between items-center">
                    <h2 class="text-2xl font-bold">Manage Projects</h2>
                    <button id="addProjectBtn" class="px-4 py-2 bg-cyan-500 text-slate-950 font-bold rounded-lg hover:bg-cyan-600 transition">
                        <i class="fas fa-plus mr-2"></i>Add Project
                    </button>
                </div>

                <div id="projectsList" class="space-y-4">
                    <!-- Projects will be loaded here -->
                </div>

                <!-- Add/Edit Project Modal -->
                <div id="projectModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                    <div class="bg-slate-900 border border-slate-800 rounded-lg p-8 max-w-2xl w-full max-h-96 overflow-y-auto">
                        <h3 id="projectModalTitle" class="text-2xl font-bold mb-6 text-cyan-400">Add New Project</h3>
                        <form id="projectForm" class="space-y-4">
                            <input type="hidden" id="projectId">
                            <input type="text" placeholder="Project Title" id="projectTitle" required class="w-full px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg focus:border-cyan-500 focus:outline-none">
                            <textarea placeholder="Project Description" id="projectDesc" rows="3" required class="w-full px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg focus:border-cyan-500 focus:outline-none"></textarea>
                            <select id="projectCategory" required class="w-full px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg focus:border-cyan-500 focus:outline-none">
                                <option value="">Select Category</option>
                                <option value="ecommerce">E-Commerce</option>
                                <option value="business">Business</option>
                                <option value="portfolio">Portfolio</option>
                            </select>
                            <input type="url" placeholder="Live Demo Link" id="projectLink" class="w-full px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg focus:border-cyan-500 focus:outline-none">
                            <input type="url" placeholder="Image URL (paste from Imgur/GitHub)" id="projectImage" class="w-full px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg focus:border-cyan-500 focus:outline-none">
                            <div class="flex gap-2">
                                <button type="submit" class="flex-1 px-4 py-2 bg-cyan-500 text-slate-950 font-bold rounded-lg hover:bg-cyan-600 transition">Save Project</button>
                                <button type="button" class="flex-1 px-4 py-2 bg-slate-800 rounded-lg hover:bg-slate-700 transition" onclick="document.getElementById('projectModal').classList.add('hidden')">Cancel</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Services Tab -->
            <div id="services" class="tab-content hidden">
                <div class="mb-6 flex justify-between items-center">
                    <h2 class="text-2xl font-bold">Manage Services</h2>
                    <button id="addServiceBtn" class="px-4 py-2 bg-cyan-500 text-slate-950 font-bold rounded-lg hover:bg-cyan-600 transition">
                        <i class="fas fa-plus mr-2"></i>Add Service
                    </button>
                </div>

                <div id="servicesList" class="space-y-4">
                    <!-- Services will be loaded here -->
                </div>

                <!-- Add/Edit Service Modal -->
                <div id="serviceModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                    <div class="bg-slate-900 border border-slate-800 rounded-lg p-8 max-w-2xl w-full max-h-96 overflow-y-auto">
                        <h3 id="serviceModalTitle" class="text-2xl font-bold mb-6 text-cyan-400">Add New Service</h3>
                        <form id="serviceForm" class="space-y-4">
                            <input type="hidden" id="serviceId">
                            <input type="text" placeholder="Service Name" id="serviceName" required class="w-full px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg focus:border-cyan-500 focus:outline-none">
                            <textarea placeholder="Service Description" id="serviceDesc" rows="3" required class="w-full px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg focus:border-cyan-500 focus:outline-none"></textarea>
                            <textarea placeholder="Features (one per line)" id="serviceFeatures" rows="4" class="w-full px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg focus:border-cyan-500 focus:outline-none"></textarea>
                            <input type="number" placeholder="Price (Optional)" id="servicePrice" step="0.01" class="w-full px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg focus:border-cyan-500 focus:outline-none">
                            <div class="flex gap-2">
                                <button type="submit" class="flex-1 px-4 py-2 bg-cyan-500 text-slate-950 font-bold rounded-lg hover:bg-cyan-600 transition">Save Service</button>
                                <button type="button" class="flex-1 px-4 py-2 bg-slate-800 rounded-lg hover:bg-slate-700 transition" onclick="document.getElementById('serviceModal').classList.add('hidden')">Cancel</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Bookings Tab -->
            <div id="bookings" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-6">Service Bookings</h2>
                <div id="bookingsList" class="space-y-4">
                    <!-- Bookings will be loaded here -->
                </div>
            </div>

            <!-- Inquiries Tab -->
            <div id="inquiries" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-6">Client Inquiries</h2>
                <div id="inquiriesList" class="space-y-4">
                    <!-- Inquiries will be loaded here -->
                </div>
            </div>

            <!-- Reviews Tab -->
            <div id="reviews" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-6">Client Reviews</h2>
                <div id="reviewsList" class="space-y-4">
                    <!-- Reviews will be loaded here -->
                </div>
            </div>

            <!-- Settings Tab -->
            <div id="settings" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-6">Website Settings</h2>
                <div class="bg-slate-900 border border-slate-800 rounded-lg p-6 space-y-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">WhatsApp Number</label>
                        <input type="tel" id="settingsWhatsapp" value="8822322905" class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg focus:border-cyan-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Email Address</label>
                        <input type="email" id="settingsEmail" value="webcraft1130@gmail.com" class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg focus:border-cyan-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Business Location</label>
                        <input type="text" id="settingsLocation" value="Guwahati, Assam, India" class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg focus:border-cyan-500 focus:outline-none">
                    </div>
                    <button id="saveSettingsBtn" class="px-6 py-3 bg-cyan-500 text-slate-950 font-bold rounded-lg hover:bg-cyan-600 transition">
                        <i class="fas fa-save mr-2"></i>Save Settings
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ADD THESE INSTEAD -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
